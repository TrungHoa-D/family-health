name: family_health
description: "Family Health application."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Router
  auto_route: 10.0.1

  # State management
  flutter_bloc: 9.1.0

  # Generator for unions/pattern-matching/copy
  freezed: 2.5.8

  # DIP
  get_it: 8.0.3
  injectable: 2.5.0

  # Logger
  logger: 2.5.0
  pretty_dio_logger: 1.4.0

  # Localization
  easy_localization: 3.0.7+1

  # Network
  dio: 5.8.0+1
  retrofit: 4.4.2
  json_annotation: 4.9.0
  dio_cookie_manager: 3.2.0
  cookie_jar: 4.0.8
  path_provider: 2.1.5

  # Local data
  shared_preferences: 2.5.2
  flutter_secure_storage: 9.2.4
  flutter_dotenv: 5.2.1

  # Alert
  cool_alert: 2.0.1

  # Resource
  flutter_gen_runner: 5.10.0
  flutter_svg: 2.0.17
  one_context: ^4.1.0

  # UI
  dropdown_button2: 2.3.9
  card_loading: 0.3.2
  focus_detector: 2.0.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  google_generative_ai: ^0.4.0

  # Testing
  mockito: ^5.4.5
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  uuid: ^4.5.1
  flutter_markdown: ^0.7.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Generating files
  build_runner: ^2.4.15
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.4

  # Router
  auto_route_generator: ^10.0.1

  # Network
  retrofit_generator: ^9.1.9

  dependency_validator: ^5.0.2
  flutter_launcher_icons: ^0.14.4
  bloc_test: ^10.0.0

flutter_gen:
  line_length: 80
  integrations:
    flutter_svg: true

dependency_overrides:
  flare_flutter:
    git:
      url: https://github.com/mbfakourii/Flare-Flutter.git
      path: flare_flutter
      ref: remove_hashValues

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/credentials/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/GoogleSans-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/GoogleSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/GoogleSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSans-MediumItalic.ttf
          weight: 500
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
  image_path: "assets/images/logo.png"

<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#424656",
              "surface-container-lowest": "#ffffff",
              "primary-container": "#0066ff",
              "background": "#fcf9f8",
              "on-tertiary-container": "#fff6f4",
              "on-secondary-container": "#007261",
              "tertiary-fixed": "#ffdbd0",
              "outline": "#727687",
              "on-error": "#ffffff",
              "surface-tint": "#0054d6",
              "on-background": "#1c1b1b",
              "on-tertiary-fixed-variant": "#832600",
              "on-secondary-fixed-variant": "#005145",
              "inverse-surface": "#313030",
              "on-primary-container": "#f8f7ff",
              "tertiary": "#a33200",
              "tertiary-container": "#cc4204",
              "surface": "#fcf9f8",
              "error": "#ba1a1a",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#00201a",
              "surface-variant": "#e5e2e1",
              "surface-container-high": "#eae7e7",
              "on-tertiary-fixed": "#390c00",
              "secondary-container": "#68fadd",
              "on-primary-fixed-variant": "#003fa4",
              "surface-container-low": "#f6f3f2",
              "surface-dim": "#dcd9d9",
              "inverse-primary": "#b3c5ff",
              "inverse-on-surface": "#f3f0ef",
              "primary-fixed-dim": "#b3c5ff",
              "primary": "#0050cb",
              "surface-container-highest": "#e5e2e1",
              "on-primary-fixed": "#001849",
              "primary-fixed": "#dae1ff",
              "outline-variant": "#c2c6d8",
              "tertiary-fixed-dim": "#ffb59d",
              "on-secondary": "#ffffff",
              "on-primary": "#ffffff",
              "secondary-fixed": "#68fadd",
              "secondary-fixed-dim": "#44ddc1",
              "secondary": "#006b5c",
              "on-surface": "#1c1b1b",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "surface-bright": "#fcf9f8",
              "surface-container": "#f0eded"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
      }
      .loading-spinner {
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 3px solid #ffffff;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .bg-splash-gradient {
        background: linear-gradient(135deg, #0066FF 0%, #E8F0FE 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-splash-gradient min-h-screen flex items-center justify-center font-body selection:bg-primary-container/30">
<!-- Splash Screen Container -->
<main class="relative flex flex-col items-center justify-center w-full max-w-md px-8 text-center">
<!-- Center Stack -->
<div class="flex flex-col items-center space-y-8">
<!-- App Logo Component -->
<div class="relative flex items-center justify-center w-[80px] h-[80px] bg-white rounded-2xl shadow-xl">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">
                    favorite
                </span>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] text-white" data-icon="add" style="font-variation-settings: 'wght' 700;">
                        add
                    </span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-3">
<h1 class="text-[28px] font-bold text-white tracking-tight leading-tight">
                    Family Health
                </h1>
<p class="text-[16px] font-normal text-white/80 leading-relaxed">
                    Quản lý Y tế Gia đình
                </p>
</div>
<!-- Loading Indicator -->
<div class="pt-12">
<div class="loading-spinner"></div>
</div>
</div>
<!-- Signature Branding (Subtle Footer) -->
<footer class="absolute bottom-12 left-0 right-0 flex flex-col items-center">
<div class="flex items-center space-x-2 text-white/40 text-[10px] font-label uppercase tracking-[0.2em]">
<span>Clinical Concierge</span>
<span class="w-1 h-1 rounded-full bg-white/40"></span>
<span>Premium Quality</span>
</div>
</footer>
</main>
<!-- Decorative Aesthetic Elements (Glassmorphism blobs for texture) -->
<div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] bg-white/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-primary/20 rounded-full blur-[80px] pointer-events-none"></div>
</body></html>
